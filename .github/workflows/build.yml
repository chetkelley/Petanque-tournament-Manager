name: Build Windows EXE
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas openpyxl pyinstaller
          
      - name: Build EXE
        run: pyinstaller --noconsole --onefile --name "Tournament_Manager_De" Tournament_Manager_De.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Tournament-Manager-EXE
          path: dist/PetanquePro_DE.exe
